<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title | escape }} - {% endif %}{{ site.title | escape }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <!-- Open Graph -->
    <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/icons/favicon-32x32.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/icons/favicon-16x16.png' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/icons/apple-touch-icon.png' | relative_url }}">

    <!-- SEO Plugin -->
    {% seo %}

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
</head>
<body>
    {% if page.url == "/" %}
    <!-- Homepage: header & footer are in index.md content -->
    {{ content }}
    {% else %}
    <!-- Subpages (privacy, terms): simple chrome -->
    <header class="header">
        <nav class="nav container">
            <a href="{{ '/' | relative_url }}" class="logo">
                <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="ShareWants" class="logo-img">
                <span>{{ site.title }}</span>
            </a>
        </nav>
    </header>

    <main class="page-content container">
        {{ content }}
    </main>

    <footer class="footer">
        <div class="container footer-inner">
            <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
            <div class="footer-links">
                <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
                <a href="{{ '/terms/' | relative_url }}">Terms</a>
                <a href="mailto:{{ site.email }}">Contact</a>
            </div>
        </div>
    </footer>
    {% endif %}

    <script>
    // Header scroll shadow
    (function() {
        var header = document.querySelector('.header');
        if (!header) return;
        window.addEventListener('scroll', function() {
            header.classList.toggle('scrolled', window.scrollY > 10);
        });
    })();

    // Smooth scroll for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(function(a) {
        a.addEventListener('click', function(e) {
            var target = document.querySelector(this.getAttribute('href'));
            if (target) {
                e.preventDefault();
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });
    });
    </script>
</body>
</html>

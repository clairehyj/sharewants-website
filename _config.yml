# Site settings
title: No More Bad Gift
email: contact@nobadgift.com
description: >-
  Transform your gift-giving experience with thoughtful discoveries. Connect with friends, 
  share wishlists, and give gifts that truly matter. Join thousands of women who never 
  give disappointing gifts again.
tagline: "Give Gifts That Matter"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://nobadgift.com" # the base hostname & protocol for your site
twitter_username: nobadgift
github_username: clairehjy

# App store links (update when available)
app_store_url: "#"
google_play_url: "#"

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Blog settings
paginate: 5
paginate_path: "/blog/page:num/"

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# SEO settings
logo: /assets/images/logo.png
social:
  name: NoBadGift
  links:
    - https://twitter.com/nobadgift
    - https://github.com/clairehjy/nobadgift

# Default settings
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "NoBadGift Team"
  - scope:
      path: ""
    values:
      layout: "default"

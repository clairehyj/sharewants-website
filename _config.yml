# Site settings
title: ShareWants
email: contact@sharewants.com
description: >-
  Know what your friends and family actually want. Social wishlists that make
  gift-giving effortless.
baseurl: ""
url: "https://sharewants.com"

# App store links
app_store_url: "https://apps.apple.com/app/sharewants/id6744228534"
play_store_url: "https://play.google.com/store/apps/details?id=com.sharewants.ShareWants"

# Web app
web_app_url: "https://app.sharewants.com"

# Include dotfile directories (needed for .well-known/apple-app-site-association)
include:
  - .well-known

# Build settings
theme: null
markdown: kramdown
plugins:
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - README.md
  - PROJECT_INDEX.md
  - package.json
  - package-lock.json
  - take-screenshots.mjs

# SEO settings
logo: /assets/images/logo.png

# Default layout
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# Site settings
title: ShareWants
tagline: "Create & Share Wishlists for Any Occasion"
email: contact@sharewants.com
description: >-
  Create and share wishlists from any store. The free wishlist app for birthdays,
  Christmas, weddings, and every occasion. Follow friends and family to see what
  they actually want. Available on iOS and Android.
baseurl: ""
url: "https://sharewants.com"

# Social / SEO
twitter:
  username: sharewants
  card: summary_large_image
social:
  name: ShareWants
  links:
    - https://apps.apple.com/app/sharewants/id6744228534
    - https://play.google.com/store/apps/details?id=com.sharewants.ShareWants
locale: en_US

# App store links
app_store_url: "https://apps.apple.com/app/sharewants/id6744228534"
play_store_url: "https://play.google.com/store/apps/details?id=com.sharewants.ShareWants"

# Web app
web_app_url: "https://app.sharewants.com"

# Include dotfile directories (needed for .well-known/apple-app-site-association)
include:
  - .well-known

# Build settings
theme: null
markdown: kramdown
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap

# Blog / Pagination
paginate: 12
paginate_path: "/blog/page:num"
permalink: /blog/:year/:month/:title/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - README.md
  - PROJECT_INDEX.md
  - package.json
  - package-lock.json
  - take-screenshots.mjs

# SEO settings
logo: /assets/images/logo.png

# Default layout
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "ShareWants"
